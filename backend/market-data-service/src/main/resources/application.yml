server:
  port: 8084

spring:
  application:
    name: market-data-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  issuer: ${JWT_ISSUER:investment-helper-auth-service}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}

yahoo:
  refresh-cron: ${YAHOO_REFRESH_CRON:0 0 2 * * *}

financial-modeling-prep:
  api-key: ${FMP_API_KEY:add-your-key-here}