server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/users/**

            - id: auth-service-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: gateway,health

jwt:
  issuer: ${JWT_ISSUER:investment-helper-auth-service}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}