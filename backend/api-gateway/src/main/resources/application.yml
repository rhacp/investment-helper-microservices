server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service-route
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**

            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**

            - id: portfolio-service-route
              uri: lb://portfolio-service
              predicates:
                - Path=/api/v1/portfolios/**,/api/v1/holdings/**

            - id: market-data-service-route
              uri: lb://market-data-service
              predicates:
                - Path=/api/v1/stocks/**

            - id: prediction-service-route
              uri: lb://prediction-service
              predicates:
                - Path=/api/v1/predictions/**

            - id: analytics-service-route
              uri: lb://analytics-service
              predicates:
                - Path=/api/v1/analytics/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: gateway,health

jwt:
  issuer: ${JWT_ISSUER:investment-helper-auth-service}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}