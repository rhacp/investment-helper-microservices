server:
  port: 8082

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

jwt:
  issuer: investment-helper-auth-service
  access-token-expiration-seconds: 1800
  private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}

app:
  bootstrap-admin:
    enabled: true
    email: admin@investment-helper.com
    password: ${BOOTSTRAP_ADMIN_PASSWORD:admin123}