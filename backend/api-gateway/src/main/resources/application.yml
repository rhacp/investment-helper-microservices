server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:

            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**

            - id: user-service-route
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**

            - id: portfolio-service-route
              uri: lb://portfolio-service
              predicates:
                - Path=/api/v1/portfolios/**,/api/v1/holdings/**

            - id: market-data-service-route
              uri: lb://market-data-service
              predicates:
                - Path=/api/v1/stocks/**

            - id: prediction-service-route
              uri: lb://prediction-service
              predicates:
                - Path=/api/v1/predictions/**,/api/v1/trainings/**

            - id: analytics-service-route
              uri: lb://analytics-service
              predicates:
                - Path=/api/v1/analytics/**

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: gateway,health

jwt:
  issuer: ${JWT_ISSUER:investment-helper-auth-service}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}